<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; overflow: hidden; }
        /* Smooth Transitions */
        .screen { position: absolute; width: 100%; height: 100vh; transition: opacity 0.8s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { opacity: 0; pointer-events: none; }
        
        /* Gallery */
        #main-app { display: flex; flex-direction: column; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; overflow-y: auto; max-height: 70vh; }
        .block-item { background: #333; padding: 10px; cursor: pointer; text-align: center; border-radius: 8px; }
        .enabled { border: 2px solid #00ff00; }
        
        input { padding: 10px; width: 300px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- Screen 1: Welcome -->
    <div id="welcome" class="screen">
        <h1>Minecraft Block Finder</h1>
        <button onclick="nextScreen('seed-screen')">Enter World</button>
    </div>

    <!-- Screen 2: Seed Input -->
    <div id="seed-screen" class="screen hidden">
        <h1>Enter Seed</h1>
        <input type="text" id="seed" placeholder="Paste your world seed here...">
        <button onclick="nextScreen('main-app')">Connect to Game</button>
    </div>

    <!-- Screen 3: Main App -->
    <div id="main-app" class="screen hidden">
        <input type="text" id="search" placeholder="Search blocks..." onkeyup="filter()">
        <div class="grid" id="gallery"></div>
        <h2>Enabled</h2>
        <div id="enabled-list"></div>
    </div>

    <script>
        const blocks = ["Stone", "Dirt", "Diamond Ore", "Gold Ore", "Iron Ore", "Oak Log", "Cobblestone"];
        let enabled = [];

        // Build Gallery
        const gallery = document.getElementById('gallery');
        blocks.forEach(b => {
            const div = document.createElement('div');
            div.className = 'block-item';
            div.innerHTML = `<div>📦</div>${b}`;
            div.onclick = () => toggle(b, div);
            gallery.appendChild(div);
        });

        function toggle(name, el) {
            if (enabled.includes(name)) {
                enabled = enabled.filter(i => i !== name);
                el.classList.remove('enabled');
            } else {
                enabled.push(name);
                el.classList.add('enabled');
            }
            document.getElementById('enabled-list').innerText = enabled.join(', ');
            // NOTE: Here you would add the WebSocket send command to talk to your mod
            console.log("Sending to Minecraft:", enabled);
        }

        function nextScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function filter() {
            const val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.block-item').forEach(i => {
                i.style.display = i.innerText.toLowerCase().includes(val) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
